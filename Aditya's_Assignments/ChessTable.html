    <title>Chess – 64 div classes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .board-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-radius: 6px;
            padding: 10px;
        }

        .board-8x8 {
            position: absolute;
            left: 50px;
            top: 50px;
            width: 400px;
            height: 400px;
            border: 3px solid #111;
            border-radius: 4px;
        }

        .label {
            position: absolute;
            font-size: 16px;
            font-weight: 700;
            color: #222;
            user-select: none;
            pointer-events: none;
            line-height: 1;
        }



        .sq {
            position: absolute;
            width: 50px;
            height: 50px;
        }

        .light {
            background: #ffffff;
        }
        .dark {

<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>

</head>
<body>

<table border="1px solid black" style="text-align:center;">

    
    <tr>
        <td colspan="3" rowspan="2">1</td>
        <td colspan="3" rowspan="2">2</td>
        <td colspan="3"  rowspan="2">3</td>
        <td colspan="3"  rowspan="2">4</td>
        <td colspan="3"  rowspan="2">5</td>
    </tr>

    <tr>
        <td colspan="6">6</td>
        <td colspan="9">7</td>
    </tr>

    <tr>
        <td colspan="9">8</td>
        <td colspan="6">9</td>
    </tr>

    <tr>
        <td colspan="6" rowspan="2">10</td>
        <td colspan="9">11</td>
    </tr>

 
    <tr>
        <td colspan="9">12</td>
    </tr>

    
    <tr>
        <td colspan="5" rowspan="3">13</td>

        <td colspan="5">14</td>

        <td colspan="5" rowspan="3">15</td>
    </tr>

    <tr>
        <td colspan="5">16</td>
    </tr>

    <tr>
        <td colspan="5">17</td>
    </tr>

  
    <tr>
        <td colspan="6">18</td>
        <td colspan="3">19</td>
        <td colspan="6">20</td>
    </tr>

    <tr>
        <td colspan="3" rowspan="3">21</td>

        <td colspan="3" rowspan="3">22</td>

        <td rowspan="2">23</td>
        <td rowspan="2">24</td>
        <td rowspan="2">25</td>

        <td colspan="3" rowspan="3">26</td>

        <td colspan="3" rowspan="3">27</td>
    </tr>

    <tr></tr>

    <tr>
        <td colspan="3">28</td>
    </tr>

    <tr>
        <td colspan="3">29</td>
        <td colspan="3">30</td>
        <td colspan="3">31</td>
        <td colspan="3">32</td>
        <td colspan="3">33</td>
    </tr>

</table>

</body>
</html>

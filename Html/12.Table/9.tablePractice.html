<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Practice 8</title>

<style>
    table{
        width: 900px;
        height: 700px;
        border-collapse: collapse;
        margin: 20px auto;
    }

    td{
        border: 3px solid black;
        text-align: center;
        vertical-align: middle;
        font-size: 18px;
        font-weight: bold;
    }
</style>
</head>
<body>

<table>

    <!-- Row 1 -->
    <tr>
        <td colspan="3">1</td>
        <td colspan="3">2</td>
        <td colspan="3">3</td>
        <td colspan="3">4</td>
        <td colspan="3">5</td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td colspan="6">6</td>
        <td colspan="9">7</td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td colspan="9">8</td>
        <td colspan="6">9</td>
    </tr>

    <!-- Row 4 -->
    <tr>
        <td colspan="6" rowspan="2">10</td>
        <td colspan="9">11</td>
    </tr>

    <!-- Row 5 -->
    <tr>
        <td colspan="9">12</td>
    </tr>

    <!-- Row 6 -->
    <tr>
        <td colspan="5" rowspan="3">13</td>
        <td colspan="5">14</td>
        <td colspan="5" rowspan="3">15</td>
    </tr>

    <!-- Row 7 -->
    <tr>
        <td colspan="5">16</td>
    </tr>

    <!-- Row 8 -->
    <tr>
        <td colspan="5">17</td>
    </tr>

    <!-- Row 9 -->
    <tr>
        <td colspan="6">18</td>
        <td colspan="3">19</td>
        <td colspan="6">20</td>
    </tr>

    <!-- Row 10 -->
    <tr>
        <td rowspan="4">21</td>
        <td colspan="2" rowspan="2">22</td>

        <td colspan="3" rowspan="4">23</td>

        <td>24</td>
        <td>25</td>
        <td>26</td>

        <td colspan="3" rowspan="4">27</td>

        <td colspan="2" rowspan="2">28</td>
        <td rowspan="4">29</td>
    </tr>

    <!-- Row 11 -->
    <tr>
        <td colspan="3" rowspan="3">30</td>
    </tr>

    <!-- Row 12 -->
    <tr>
        <td colspan="2">31</td>
        <td colspan="2">32</td>
    </tr>

    <!-- Row 13 -->
    <tr>
        <td colspan="2">33</td>
        <td colspan="2">34</td>
    </tr>

    <!-- Row 14 -->
    <tr>
        <td colspan="5">35</td>
        <td colspan="5">36</td>
        <td colspan="5">37</td>
    </tr>

</table>

</body>
</html>

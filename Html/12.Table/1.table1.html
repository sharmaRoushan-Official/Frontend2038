<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example</title>
</head>
<body bgcolor="pink">
    <h1>Table Example</h1>
    <hr>
    <p>A table is used to display data in a structured format with rows and columns.</p>

    <table border="3px" cellspacing="25%" cellpadding="20%">
        <thead>
            <tr>
                <th>Eid</th>
                <th>Name</th>
                <th>Age</th>
                <th>Salary</th>
                <th>Post</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Aditya</td>
                <td>30</td>
                <td>₹ 450000</td>
                <td>SE</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Prjakta</td>
                <td>28</td>
                <td>₹ 85000</td>
                <td>SE</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>

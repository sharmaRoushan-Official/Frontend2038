<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag</title>
</head>
<body>
    <h1>REGISTRATION FORMS</h1>
    <hr/>
    <form action="">
        <table>
            <tr>
                <th>Name</th>
                <td><input type="text" required></td>
            </tr>
            <tr>
                <th>Age</th>
                <td><input type="number"></td>
            </tr>
            <tr>
                <th>Gender</th>
                <td><input type="radio" value="Male" name="gen">Male</td>
                <td><input type="radio" value="Female" name="gen">Female</td>
            </tr>
            <tr>
                <th>DOB</th>
                <td><input type="date" required></td>
            </tr>
            <tr>
                <th>Address</th>
                <td><textarea name="" id="" rows="5" cols="25"></textarea></td>
            </tr>
            <tr>
                <th>City</th>
                <td>
                    <select name="" id="">
                        <option value="Delhi">Delhi</option>
                        <option value="Ajmer">Ajmer</option>
                        <option value="Noida">Noida</option>
                        <option value="Noida">Ghaziabad</option>
                        <option value="Noida">Goa</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th>Email</th>
                <td><input type="email"></td>
            </tr>
            <tr>
                <th>Password</th>
                <td><input type="password"></td>
            </tr>
            <tr>
                <th>Area of Interest</th>
                <td>
                    <input type="checkbox"> Java
                    <br/>
                    <input type="checkbox"> Angular
                    <br/>
                    <input type="checkbox"> Python
                    <br/>
                    <input type="checkbox"> Dot Net
                    <br/>
                    <input type="checkbox"> C
                </td>
            </tr>

            <tr>
                <td><input type="submit"></td>
            </tr>
        </table>
    </form>
</body>
</html>

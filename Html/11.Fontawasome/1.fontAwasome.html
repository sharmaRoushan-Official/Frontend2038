<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Awesome Example</title>
    <!-- Link to Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>
    <h1>Font Awesome Example</h1>
    <hr>
    <p>Font Awesome is a popular icon library that provides a wide range of icons for web development.</p>

    <!-- Example of using Font Awesome icons -->
    <i class="fas fa-home"></i> Home<br>
    <i class="fas fa-user"></i> User<br>
    <i class="fas fa-envelope"></i> Email<br>
    <i class="fas fa-phone"></i> Phone<br>
    <i class="fas fa-cog"></i> Settings<br>
    <i class="fas fa-heart"></i> Favorite<br>
    <i class="fas fa-search"></i> Search<br>
    <i class="fas fa-map-marker-alt"></i> Address<br>
    <i class="fas fa-mobile-alt"></i> Mobile<br>
    <i class="fas fa-map-marker-alt"></i> Location<br>
</body>
</html>

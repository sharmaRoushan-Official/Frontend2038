<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
    <style>
        #po{
            background-color: antiquewhite;
            font-size: 30px;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        #kl{
            background-color: aquamarine;
            font-size: 40px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <h1>Example of ID Selector</h1>
    <div>Hello CSS</div>
    <p id="kl">Hello This is First Paragraph</p>
    <p id="po">Hello This is Second Paragraph</p>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Table</title>
    <style>
        table{
            border: 2px solid red;
            border-collapse: collapse;
            background-color: aquamarine;
        }
        td{
            height: 35px;
            /* vertical-align: bottom; */
            /* vertical-align: middle; */
            /* vertical-align: top; */
            vertical-align: auto;
        }
        /* selected table row color  */
        tr:nth-child(even){
            background-color: red;
        }
        tr:nth-child(odd){
            background-color: green;
        }
    </style>
</head>
<body>
    <h1>CSS Table</h1>
    <table>
        <tr>
            <th>EID</th>
            <th>NAME</th>
            <th>AGE</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Ashish</td>
            <td>23</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Vinod</td>
            <td>55</td>
        </tr>
    </table>
</body>
</html>

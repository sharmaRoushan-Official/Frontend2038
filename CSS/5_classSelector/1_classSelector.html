<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector</title>
    <style>
        .kl{
            background-color: red;
            font-size: 30px;
        }
        .po{
            background-color: green;
            font-size: 45px;
        }
    </style>
</head>
<body>
    <h1>Hello This is Class Selector</h1>
    <div>Hello CSS</div>
    <p class="kl">Hello Fist Paragraph</p>
    <p class="po">Hello Second Paragraph</p>
    
</body>
</html>

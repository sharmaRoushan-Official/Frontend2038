<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PseudoSelector</title>
    <style>
        /* 1.unvisited Link  */
        a:link{
            /* background-color: cyan; */
            color: red;
        }
        /* 2.visited  */
        a:visited{
            color:rgb(239, 142, 45);
        }

        /* 3.hover  */
        a:hover{
            color: chartreuse;
            background-color: white;
        }

        /* 4.active link  */
        a:active{
            color: rgb(48, 74, 20);
            
        }
    </style>
</head>
<body>
    <h1>Example of Pseudo Selector</h1>

    <br><br>
    <a href="../3.ExternalCSS/1_externalCSS.html">ExternalCSS</a>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>
    <style>
        div,p,h1{
            background-color: aquamarine;
            font-family: cursive;
        }
        div,p{
            font-size: 25px;
        }
    </style>
</head>
<body>
    <h1>Group Selector</h1>
    <div>Hello CSS</div>
    <p class="kl">This is a paragraph.</p>
    <p class="po">This is another paragraph.</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Transform</title>
    <style>
        h1{
            text-transform: uppercase;
        }
        h2{
            text-transform: lowercase;
        }
        h3{
            text-transform: capitalize;
        }
        h4{
            text-transform: none;
        }
    </style>
</head>
<body>
    <h1>hello Text Transform.</h1>
    <h2>hello Text Transform.</h2>
    <h3>hello Text Transform.</h3>
    <h4>hello Text Transform.</h4>
</body>
</html>

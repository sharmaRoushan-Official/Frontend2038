<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Sibling</title>
    <style>
        div~p{
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>Example of General Sibling Selector</h1>

    <div>
        <p>This is My First Paragraph</p>
    </div>

    <p>This is my second paragraph</p>
    <p>This is my Third paragraph</p>

    <div>
        <p>This is fouth paragraph</p>
        <h2>This is My Second Heading Tag.</h2>
        <p>This is Fifth paragraph</p>
    </div>
    <p>Hello this is adjacent selector</p>
    <p>This is React JS.</p>
    <p>This is Node JS</p>   
</body>
</html>

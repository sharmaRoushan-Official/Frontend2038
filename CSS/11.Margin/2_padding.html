<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Exmaple</title>
    <style>
        /* if you have one value  */
        h1{
            margin: 20px;
            border: 2px solid black;
            padding: 10px;
        }
        h2{
            margin: 20px 30px;
            border: 2px solid black;
            padding: 10px 12px;
        }
        h3{
            margin:20px 15px 30px ;
            border: 2px solid black;
            padding: 5px 10px 15px;
        }
        h4{
            margin:20px 30px 40px 50px;
            border: 2px solid black;
            padding: 10px 20px 25px 30px;
        }
    </style>
</head>
<body>
    <h1>Hello Margin</h1>
    <h2>Hello Second Margin</h2>
    <h3>Hello Thrid Margin</h3>
    <h4>Hello Fourth Margin</h4>
</body>
</html>

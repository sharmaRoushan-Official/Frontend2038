<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Layout</title>
    <style>
        .box1{
            height: 100px;
            width: 250;
            background-color: orangered;
            border: 1px solid black;
            position: relative;
            top: 50px;
            left: 100px;
        }
        .box2{
            height: 100px;
            width: 250;
            background-color: whitesmoke;
            border: 1px solid black;
            margin-left: 251px;
            position: relative;
            top: 50px;
            left: 100px;
        }
        .box3{
            height: 100px;
            width: 250;
            background-color: whitesmoke;
            border: 1px solid black;
            margin-left: 251px;
            position: relative;
            top: 50px;
            left: 150px;
        }
        
    </style>
</head>
<body>
    <div class="box1">
        BOX1
    </div>
    <div class="box2">
        BOX2
    </div>
    <div class="box3">
        BOX3
    </div>
</body>
</html>

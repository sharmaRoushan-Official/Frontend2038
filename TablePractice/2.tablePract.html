    <title>Table</title>
</head>
<body>

        <tr>

            <th>Region</th>
            <th>Q1</th>

            <th>Q4</th>
        </tr>

            <th rowspan="2">Product X</th>
            <th>$30,000</th>

            <th>$32,000</th>

    </table>
